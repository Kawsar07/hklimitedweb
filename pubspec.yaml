name: solar_pv_hk
description: "Solar PV HK Limited"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  google_fonts: ^8.1.0
  go_router: ^17.3.0
  url_launcher: ^6.3.2
  http: ^1.6.0
  flutter_riverpod: ^3.3.2
  firebase_core: ^4.12.1
  cloud_firestore: ^6.7.1
  firebase_auth: ^6.5.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/   # keep whatever you already had here
    - assets/images/products/
  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora-Variable.ttf
          weight: 400
        - asset: assets/fonts/Sora-Variable.ttf
          weight: 600
        - asset: assets/fonts/Sora-Variable.ttf
          weight: 700
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Variable.ttf
          weight: 400
        - asset: assets/fonts/Manrope-Variable.ttf
          weight: 700
