<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Solar PV HK Limited - A Hong Kong-based sourcing house for solar panels, inverters & renewable energy hardware, delivered worldwide.">
  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="solar_pv_hk">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>solar_pv_hk</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Firebase is now initialized from Dart (lib/main.dart + lib/firebase_options.dart)
    using this same project's config, so it can be shared by Firestore/Auth
    (live chat) as well. A manual script-tag init here would create a
    second, conflicting Firebase app instance, so it's intentionally not
    duplicated. If you want Google Analytics back, add the
    `firebase_analytics` Flutter package instead of a script tag.
  -->
</head>
<body>
<!--
  You can customize the "flutter_bootstrap.js" script.
  This is useful to provide a custom configuration to the Flutter loader
  or to give the user feedback during the initialization process.

  For more details:
  * https://docs.flutter.dev/platform-integration/web/initialization
-->
<script src="flutter_bootstrap.js" async></script>
</body>
</html>
